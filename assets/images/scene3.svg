<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="boldBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f1520;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#060a10;stop-opacity:1" />
    </linearGradient>
    <filter id="boldGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1920" height="1080" fill="url(#boldBg)"/>
  
  <!-- Bold white/silver geometric forms - STRIKING -->
  <circle cx="250" cy="200" r="180" fill="#e8eef5" opacity="0.35" filter="url(#boldGlow)"/>
  <circle cx="1700" cy="280" r="200" fill="#d0dae8" opacity="0.32" filter="url(#boldGlow)"/>
  <circle cx="900" cy="880" r="170" fill="#c0cce0" opacity="0.30" filter="url(#boldGlow)"/>
  
  <!-- Bold central accent shapes -->
  <polygon points="960,150 1150,450 960,750 770,450" fill="#e8eef5" opacity="0.25" filter="url(#boldGlow)"/>
  
  <!-- Striking connecting lines - high contrast -->
  <line x1="250" y1="200" x2="960" y2="540" stroke="#e8eef5" stroke-width="4" opacity="0.55" filter="url(#boldGlow)"/>
  <line x1="960" y1="540" x2="1700" y2="280" stroke="#d0dae8" stroke-width="4" opacity="0.50" filter="url(#boldGlow)"/>
  <line x1="900" y1="880" x2="960" y2="540" stroke="#c0cce0" stroke-width="3" opacity="0.48" filter="url(#boldGlow)"/>
  
  <!-- Bold geometric accent lines - strong presence -->
  <g stroke="#e8eef5" stroke-width="3" opacity="0.40" filter="url(#boldGlow)">
    <line x1="960" y1="80" x2="960" y2="1000"/>
    <line x1="150" y1="540" x2="1770" y2="540"/>
  </g>
  
  <!-- Striking nodes - very visible -->
  <circle cx="250" cy="200" r="26" fill="#e8eef5" opacity="0.80" filter="url(#boldGlow)"/>
  <circle cx="1700" cy="280" r="28" fill="#d0dae8" opacity="0.75" filter="url(#boldGlow)"/>
  <circle cx="900" cy="880" r="24" fill="#c0cce0" opacity="0.72" filter="url(#boldGlow)"/>
  <circle cx="960" cy="540" r="30" fill="#e8eef5" opacity="0.78" filter="url(#boldGlow)"/>
  
  <!-- Bold geometric rectangles - significant presence -->
  <rect x="200" y="150" width="100" height="100" fill="#e8eef5" opacity="0.28" filter="url(#boldGlow)"/>
  <rect x="1620" y="200" width="160" height="160" fill="#d0dae8" opacity="0.25" filter="url(#boldGlow)"/>
  <rect x="650" y="750" width="620" height="3" fill="#e8eef5" opacity="0.45" filter="url(#boldGlow)"/>
  
  <!-- Bold flowing accent paths -->
  <path d="M100 350 Q500 300 900 500" stroke="#e8eef5" stroke-width="3" fill="none" opacity="0.50" filter="url(#boldGlow)"/>
  <path d="M1000 600 Q1400 700 1800 550" stroke="#d0dae8" stroke-width="3" fill="none" opacity="0.45" filter="url(#boldGlow)"/>
  
  <!-- Bold central emphasis -->
  <circle cx="960" cy="540" r="350" fill="#e8eef5" opacity="0.12"/>
  <circle cx="960" cy="540" r="150" fill="#d0dae8" opacity="0.15"/>
  
  <!-- Secondary accent grid - visible but not dominant -->
  <g stroke="#8899bb" stroke-width="2" opacity="0.20" filter="url(#boldGlow)">
    <line x1="400" y1="0" x2="400" y2="1080" opacity="0.15"/>
    <line x1="1520" y1="0" x2="1520" y2="1080" opacity="0.15"/>
  </g>
  
  <!-- Strong vignette -->
  <defs>
    <radialGradient id="vigBold" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0.15" />
      <stop offset="70%" style="stop-color:#000000;stop-opacity:0.32" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.55" />
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#vigBold)"/>
</svg>