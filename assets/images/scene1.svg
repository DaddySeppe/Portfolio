<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="blendBg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1810;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3d2415;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f1208;stop-opacity:1" />
    </linearGradient>
    <filter id="blendGlow1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1920" height="1080" fill="url(#blendBg1)"/>
  
  <!-- Warm organic blobs (from B) with cosmic reach (from A) -->
  <ellipse cx="400" cy="340" rx="300" ry="270" fill="#ea580c" opacity="0.22" filter="url(#blendGlow1)"/>
  <ellipse cx="1500" cy="260" rx="350" ry="290" fill="#f97316" opacity="0.20" filter="url(#blendGlow1)"/>
  <ellipse cx="850" cy="800" rx="320" ry="300" fill="#d97706" opacity="0.18" filter="url(#blendGlow1)"/>
  
  <!-- Cosmic accent glow (from A) -->
  <circle cx="960" cy="540" r="420" fill="#eab308" opacity="0.08" filter="url(#blendGlow1)"/>
  
  <!-- Flowing curves -->
  <path d="M0,400 Q480,280 960,450 T1920,380" fill="#fb923c" opacity="0.07"/>
  <path d="M0,720 Q480,620 960,780 T1920,700" fill="#f97316" opacity="0.05"/>
  
  <!-- Soft particles (from A's cosmic feel) -->
  <circle cx="480" cy="220" r="6" fill="#fcd34d" opacity="0.6" filter="url(#blendGlow1)"/>
  <circle cx="1350" cy="880" r="8" fill="#fb923c" opacity="0.55" filter="url(#blendGlow1)"/>
  <circle cx="300" cy="750" r="5" fill="#f97316" opacity="0.5" filter="url(#blendGlow1)"/>
  <circle cx="1650" cy="320" r="7" fill="#ea580c" opacity="0.52" filter="url(#blendGlow1)"/>
  
  <!-- Vignette -->
  <defs>
    <radialGradient id="vigBlend1" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0.12" />
      <stop offset="70%" style="stop-color:#000000;stop-opacity:0.28" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.48" />
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#vigBlend1)"/>
</svg>