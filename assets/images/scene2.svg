<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="blendBg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d1a4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a1f;stop-opacity:1" />
    </linearGradient>
    <filter id="blendGlow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1920" height="1080" fill="url(#blendBg2)"/>
  
  <!-- Vibrant but balanced neon (from C) with structure (from A) -->
  <circle cx="350" cy="310" r="260" fill="#00d9ff" opacity="0.30" filter="url(#blendGlow2)"/>
  <circle cx="1550" cy="270" r="280" fill="#d946ef" opacity="0.28" filter="url(#blendGlow2)"/>
  <circle cx="800" cy="830" r="240" fill="#00d9ff" opacity="0.25" filter="url(#blendGlow2)"/>
  <circle cx="1250" cy="700" r="260" fill="#d946ef" opacity="0.26" filter="url(#blendGlow2)"/>
  
  <!-- Structured grid from tech (from A) - subtle -->
  <g opacity="0.12" stroke="#06b6d4" stroke-width="1.5" filter="url(#blendGlow2)">
    <line x1="0" y1="270" x2="1920" y2="270"/>
    <line x1="0" y1="540" x2="1920" y2="540"/>
    <line x1="0" y1="810" x2="1920" y2="810"/>
    <line x1="320" y1="0" x2="320" y2="1080" opacity="0.08"/>
    <line x1="960" y1="0" x2="960" y2="1080"/>
    <line x1="1600" y1="0" x2="1600" y2="1080" opacity="0.08"/>
  </g>
  
  <!-- Neon connection lines -->
  <line x1="350" y1="310" x2="800" y2="830" stroke="#00d9ff" stroke-width="3" opacity="0.55" filter="url(#blendGlow2)"/>
  <line x1="1550" y1="270" x2="1250" y2="700" stroke="#d946ef" stroke-width="3" opacity="0.50" filter="url(#blendGlow2)"/>
  <line x1="800" y1="830" x2="1250" y2="700" stroke="#00d9ff" stroke-width="2" opacity="0.45" filter="url(#blendGlow2)"/>
  
  <!-- Bright nodes -->
  <circle cx="350" cy="310" r="16" fill="#00d9ff" opacity="0.80" filter="url(#blendGlow2)"/>
  <circle cx="1550" cy="270" r="18" fill="#d946ef" opacity="0.75" filter="url(#blendGlow2)"/>
  <circle cx="800" cy="830" r="15" fill="#00d9ff" opacity="0.78" filter="url(#blendGlow2)"/>
  <circle cx="1250" cy="700" r="17" fill="#d946ef" opacity="0.72" filter="url(#blendGlow2)"/>
  <circle cx="960" cy="540" r="13" fill="#00d9ff" opacity="0.70" filter="url(#blendGlow2)"/>
  
  <!-- Data streams (balanced intensity) -->
  <path d="M200 400 Q960 300 1720 580" stroke="#00d9ff" stroke-width="2.5" fill="none" opacity="0.55" filter="url(#blendGlow2)"/>
  <path d="M200 720 Q960 800 1720 480" stroke="#d946ef" stroke-width="2.5" fill="none" opacity="0.50" filter="url(#blendGlow2)"/>
  
  <!-- Central glow balance -->
  <circle cx="960" cy="540" r="350" fill="#00d9ff" opacity="0.10"/>
  <circle cx="960" cy="540" r="200" fill="#d946ef" opacity="0.12"/>
  
  <!-- Vignette -->
  <defs>
    <radialGradient id="vigBlend2" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0.10" />
      <stop offset="70%" style="stop-color:#000000;stop-opacity:0.22" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.38" />
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#vigBlend2)"/>
</svg>